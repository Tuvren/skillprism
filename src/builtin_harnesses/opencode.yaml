id: opencode
name: OpenCode
version: 0.1.0
capabilities:
  supports_subagent: true
  requires_sidecar: false
  requires_manifest: false
  frontmatter_mode: lenient
  name_max_length: 64
  description_max_length: 1024
  supports_allowed_tools: false
  supports_disable_model_invocation: false
  supports_user_invocable_flag: false
paths:
  project_scope_path: .opencode/skills
  user_scope_path: .config/opencode/skills
  skill_filename: SKILL.md
skill_ref_pattern: /{name}
discovery:
  project: true
  user: true
  plugin: false
macros:
  subagent_guide:
    content: "## Subagent Instructions\n\nOpenCode runs skills as composable subagents with their own context."
