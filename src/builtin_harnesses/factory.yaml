id: factory
name: Factory
version: 0.1.0
capabilities:
  supports_subagent: true
  requires_sidecar: false
  requires_manifest: false
  name_max_length: 64
  description_max_length: 1024
  supports_allowed_tools: false
  supports_disable_model_invocation: true
  supports_user_invocable_flag: true
paths:
  project_scope_path: .factory/skills
  user_scope_path: .factory/skills
  skill_filename: SKILL.md
skill_ref_pattern: /{name}
discovery:
  project: true
  user: true
  plugin: false
macros:
  subagent_guide:
    content: "## Subagent Instructions\n\nFactory agents run as isolated containers with configurable resources."
