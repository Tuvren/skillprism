name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-15
          - target: aarch64-apple-darwin
            runner: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Generate man page
        if: runner.os == 'macOS' || runner.os == 'Linux'
        run: |
          ./target/${{ matrix.target }}/release/skillprism __generate_man > skillprism.1

      - name: Package binary
        shell: bash
        run: |
          BINARY_NAME="skillprism-${{ matrix.target }}"
          mkdir -p "$BINARY_NAME"
          cp "target/${{ matrix.target }}/release/skillprism" "$BINARY_NAME/"
          cp README.md LICENSE "$BINARY_NAME/"
          cp NOTICE skillprism.1 "$BINARY_NAME/" || true
          tar -cJf "$BINARY_NAME.tar.xz" "$BINARY_NAME"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.xz"

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: >
            Automated release for ${{ github.ref_name }}.
            See the repository for the full changelog.
          files: artifacts/**/*.tar.xz
          draft: false
          prerelease: false
