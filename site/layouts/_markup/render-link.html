{{- $u := urls.Parse .Destination -}}
{{- $siteHost := urls.Parse site.BaseURL -}}
{{- $isExternal := and $u.IsAbs (ne $u.Host $siteHost.Host) -}}
<a href="{{ .Destination | safeURL }}"
  {{- with .Title }} title="{{ . }}"{{ end -}}
  {{- if $isExternal }} rel="noopener noreferrer" class="link-external"{{ end -}}>
  {{- with .Text }}{{ . }}{{ end -}}
  {{- if $isExternal }}
  <svg class="link-external-icon" width="11" height="11" viewBox="0 0 12 12" aria-hidden="true" focusable="false"><path fill="currentColor" d="M9.5 0H8V1.5h1.1L5.2 5.4l1.1 1.1L10.2 2.6V3.7H11.7V0H9.5ZM7.8 7.1v3.4H2.3V2.8h3.4V1.3H.8C.4 1.3 0 1.7 0 2.1v8.8c0 .4.4.8.8.8h8.8c.4 0 .8-.4.8-.8V7.1H7.8Z"/></svg>
  {{- end -}}
</a>{{- /* chomp trailing newline */ -}}
